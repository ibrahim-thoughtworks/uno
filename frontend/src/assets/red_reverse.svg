<!-- ========================= -->
<!-- RED REVERSE CARD -->
<!-- ========================= -->

<svg width="240" height="360" viewBox="0 0 240 360" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5a5a"/>
      <stop offset="100%" stop-color="#c40000"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.35"/>
    </filter>

  </defs>

  <!-- Outer Card -->
  <rect x="10"
        y="10"
        width="220"
        height="340"
        rx="26"
        fill="white"
        filter="url(#shadow)"/>

  <!-- Inner Background -->
  <rect x="20"
        y="20"
        width="200"
        height="320"
        rx="22"
        fill="url(#bg)"/>

  <!-- Gloss -->
  <path d="M35 35 Q120 0 205 120"
        stroke="white"
        stroke-width="12"
        opacity="0.18"
        fill="none"/>

  <!-- Tilted Ellipse -->
  <ellipse cx="120"
           cy="180"
           rx="70"
           ry="120"
           fill="white"
           opacity="0.9"
           transform="rotate(25 120 180)"/>

  <!-- Center Reverse -->
  <text x="120"
        y="205"
        text-anchor="middle"
        font-size="68"
        font-family="Arial Black"
        fill="white"
        stroke="black"
        stroke-width="4">
    ↺
  </text>

  <!-- Top Left -->
  <text x="42"
        y="68"
        text-anchor="middle"
        font-size="32"
        font-family="Arial Black"
        fill="white"
        stroke="black"
        stroke-width="2">
    ↺
  </text>

  <!-- Bottom Right -->
  <text x="198"
        y="292"
        text-anchor="middle"
        font-size="32"
        font-family="Arial Black"
        fill="white"
        stroke="black"
        stroke-width="2"
        transform="rotate(180 198 292)">
    ↺
  </text>

</svg>