<!-- GREEN 0 CARD -->
<!-- ========================= -->

<svg width="240" height="360" viewBox="0 0 240 360" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#56d94f"/>
      <stop offset="100%" stop-color="#168400"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.35"/>
    </filter>

  </defs>

  <rect x="10" y="10" width="220" height="340" rx="26"
        fill="white" filter="url(#shadow)"/>

  <rect x="20" y="20" width="200" height="320" rx="22"
        fill="url(#bg)"/>

  <path d="M35 35 Q120 0 205 120"
        stroke="white"
        stroke-width="12"
        opacity="0.18"
        fill="none"/>

  <ellipse cx="120" cy="180"
           rx="70"
           ry="120"
           fill="white"
           opacity="0.9"
           transform="rotate(25 120 180)"/>

  <text x="120" y="220"
        text-anchor="middle"
        font-size="120"
        font-family="Arial Black"
        fill="white"
        stroke="black"
        stroke-width="6">0</text>

  <text x="42" y="68"
        text-anchor="middle"
        font-size="40"
        font-family="Arial Black"
        fill="white"
        stroke="black"
        stroke-width="3">0</text>

  <text x="198" y="292"
        text-anchor="middle"
        font-size="40"
        font-family="Arial Black"
        fill="white"
        stroke="black"
        stroke-width="3"
        transform="rotate(180 198 292)">0</text>

</svg>