<!-- ========================= -->
<!-- RED SKIP CARD -->
<!-- ========================= -->

<svg width="240" height="360" viewBox="0 0 240 360" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5a5a"/>
      <stop offset="100%" stop-color="#c40000"/>
    </linearGradient>

  </defs>

  <rect x="10" y="10" width="220" height="340" rx="26" fill="white"/>
  <rect x="20" y="20" width="200" height="320" rx="22" fill="url(#bg)"/>

  <ellipse cx="120" cy="180"
           rx="70"
           ry="120"
           fill="white"
           opacity="0.9"
           transform="rotate(25 120 180)"/>

  <!-- Center Skip -->
  <circle cx="120" cy="180" r="48"
          fill="none"
          stroke="black"
          stroke-width="10"/>

  <line x1="88" y1="212"
        x2="152" y2="148"
        stroke="black"
        stroke-width="10"/>

  <!-- Top Left -->
  <circle cx="42" cy="58" r="14"
          fill="none"
          stroke="black"
          stroke-width="4"/>

  <line x1="32" y1="68"
        x2="52" y2="48"
        stroke="black"
        stroke-width="4"/>

  <!-- Bottom Right -->
  <g transform="rotate(180 198 292)">
    <circle cx="198" cy="292" r="14"
            fill="none"
            stroke="black"
            stroke-width="4"/>

    <line x1="188" y1="302"
          x2="208" y2="282"
          stroke="black"
          stroke-width="4"/>
  </g>

</svg>